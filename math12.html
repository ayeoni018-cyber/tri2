<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초등 수학 5학년 - 삼각형의 넓이 구하기 (실제 기하 절단 반영본)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background-color: #FDFBF7; }
        
        /* [기본 모눈] 1, 3페이지용 (40px 단위) */
        .grid-bg-normal {
            background-image: linear-gradient(to right, #E2E8F0 1px, transparent 1px), linear-gradient(to bottom, #E2E8F0 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: 0 0;
        }

        /* [2, 4, 5페이지 전용] 확대 모눈 (48px 단위) */
        .grid-bg-p2-expanded {
            background-image: linear-gradient(to right, #E2E8F0 1px, transparent 1px), linear-gradient(to bottom, #E2E8F0 1px, transparent 1px);
            background-size: 48px 48px;
            background-position: 0 0;
        }
        
        .canvas-container { position: relative; width: 640px; height: 400px; }
        
        /* 1페이지 단위넓이 블록 스타일 */
        .pure-unit-block {
            position: absolute; width: 40px; height: 40px;
            background-color: #FBBF24; box-sizing: border-box;
            border: 1px solid #D97706;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold; color: #78350F;
        }
        
        .piece-container {
            position: absolute;
            touch-action: none;
            pointer-events: none; 
        }

        /* 5페이지 실시간 동적 절단 모눈 가이드선 */
        .p5-interactive-cut-line {
            stroke: #10B981;
            stroke-width: 2px;
            stroke-dasharray: 4 4;
            opacity: 0.4;
            cursor: pointer;
            transition: stroke-width 0.1s, opacity 0.1s;
        }
        .p5-interactive-cut-line.active-closest {
            stroke: #059669;
            stroke-width: 5px;
            stroke-dasharray: 0;
            opacity: 0.9;
        }
    </style>
</head>
<body class="p-6 flex flex-col items-center select-none">

    <div class="w-full max-w-6xl flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-stone-200 mb-6">
        <h1 class="text-xl font-bold text-stone-800 flex items-center gap-2">
            <i data-lucide="shapes" class="text-amber-500"></i> 삼각형의 넓이 구하기 조작 실험실
        </h1>
        <div class="flex gap-2" id="nav-container"></div>
    </div>

    <div class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
        
        <div class="lg:col-span-2 bg-white p-6 rounded-3xl shadow-md border border-stone-200 flex flex-col items-center justify-center">
            
            <div id="p2-top-explanation" class="w-full mb-6 hidden">
                <div class="p-5 bg-amber-50 rounded-2xl border border-amber-200 shadow-sm flex flex-col items-center justify-center">
                    <h2 class="text-lg font-bold text-stone-700 w-full text-center mb-2">약속</h2>
                    <p class="text-base md:text-lg text-stone-900 leading-relaxed font-semibold w-full text-left" id="p2-explanation-text"></p>
                </div>
            </div>

            <div class="canvas-container bg-white border-2 border-stone-300 rounded-2xl overflow-hidden shadow-inner" id="canvas-workspace" style="touch-action: none;">
                <svg id="svg-layer" class="absolute inset-0 w-full h-full" style="pointer-events: auto; z-index: 10;"></svg>
                <canvas id="drawing-layer" width="640" height="400" class="absolute inset-0" style="pointer-events: auto; z-index: 20;"></canvas>
                <div id="html-layer" class="absolute inset-0 w-full h-full pointer-events-none" style="z-index: 30;"></div>
            </div>
            
            <div id="sub-controls" class="mt-4 flex gap-4 items-center justify-center w-full hidden">
                <button onclick="prevSubShape()" class="p-4 bg-stone-100 hover:bg-stone-200 rounded-xl border border-stone-300 active:scale-95 transition cursor-pointer">
                    <i data-lucide="chevron-left" class="w-8 h-8 text-stone-700"></i>
                </button>
                <span id="sub-page-indicator" class="text-base font-bold text-stone-700 bg-stone-100 px-6 py-2 rounded-full">예시 1</span>
                <button onclick="nextSubShape()" class="p-4 bg-stone-100 hover:bg-stone-200 rounded-xl border border-stone-300 active:scale-95 transition cursor-pointer">
                    <i data-lucide="chevron-right" class="w-8 h-8 text-stone-700"></i>
                </button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-md border border-stone-200 flex flex-col justify-start min-h-[480px]">
            <div id="panel-content" class="space-y-4"></div>
            
            <div id="photo-style-drawing-panel" class="mt-5 bg-white border border-stone-200 rounded-2xl p-5 shadow-sm space-y-5 hidden">
                <h3 class="text-base font-bold text-stone-800 tracking-tight">선 그리기</h3>
                
                <div class="flex items-center gap-3 pl-1">
                    <button onclick="changeBrushColor('#000000')" id="chip-black" class="w-8 h-8 rounded-full bg-black transition transform active:scale-90 cursor-pointer border-2 border-transparent" title="검정"></button>
                    <button onclick="changeBrushColor('#EF4444')" id="chip-red" class="w-8 h-8 rounded-full bg-red-500 transition transform active:scale-90 cursor-pointer border-2 border-transparent" title="빨강"></button>
                    <button onclick="changeBrushColor('#3B82F6')" id="chip-blue" class="w-8 h-8 rounded-full bg-blue-500 transition transform active:scale-90 cursor-pointer border-2 border-transparent" title="파랑"></button>
                    <button onclick="changeBrushColor('#22C55E')" id="chip-green" class="w-8 h-8 rounded-full bg-green-500 transition transform active:scale-90 cursor-pointer border-2 border-transparent" title="초록"></button>
                    <button onclick="setEraserMode()" id="chip-eraser" class="w-8 h-8 rounded-lg bg-stone-200 hover:bg-stone-300 transition transform active:scale-90 cursor-pointer border-2 border-stone-400 flex items-center justify-center text-stone-700" title="지우개">
                        <i data-lucide="eraser" class="w-4 h-4"></i>
                    </button>
                </div>
                
                <div class="flex items-center justify-between gap-3 pt-1 px-1">
                    <button onclick="changeBrushSize(2)" id="bar-size-2" class="flex-1 py-3 flex items-center justify-center rounded-md hover:bg-stone-50 transition cursor-pointer">
                        <span class="w-full h-[2px] bg-stone-800 rounded"></span>
                    </button>
                    <button onclick="changeBrushSize(5)" id="bar-size-5" class="flex-1 py-3 flex items-center justify-center rounded-md hover:bg-stone-50 transition cursor-pointer">
                        <span class="w-full h-[5px] bg-stone-800 rounded"></span>
                    </button>
                    <button onclick="changeBrushSize(9)" id="bar-size-9" class="flex-1 py-3 flex items-center justify-center rounded-md hover:bg-stone-50 transition cursor-pointer">
                        <span class="w-full h-[9px] bg-stone-800 rounded"></span>
                    </button>
                </div>
                
                <div class="pt-1 flex justify-center">
                    <button onclick="clearCanvasOnly()" class="w-40 py-2.5 bg-stone-400 hover:bg-stone-500 text-white font-medium rounded-full text-sm transition shadow-sm tracking-wide text-center cursor-pointer">
                        초기화
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const gridShapes = {
            page1: { base: [200, 280], right: [440, 280], top: [360, 120] }, 
            // 2페이지 삼각형 규격 (math11.html 원본 형태 수치 복구 완료)
            page2: [
                { base: [192, 288], right: [432, 288], top: [336, 144], type: 'acute' }, // 1. 예각
                { base: [192, 288], right: [432, 288], top: [192, 144], type: 'right' },  // 2. 직각 (밑변 5칸 = 240px, 높이 3칸 = 144px)
                { base: [240, 288], right: [432, 288], top: [144, 144], type: 'obtuse' } // 3. 둔각 (밑변 4칸 = 192px, 높이 3칸 = 144px)
            ],
            page3: [
                { base: [240, 280], right: [400, 280], top: [320, 80] }, 
                { base: [200, 320], right: [400, 320], top: [400, 80] }, 
                { base: [160, 280], right: [400, 280], top: [440, 160] }  
            ],
            // 4페이지 2번 삼각형 수정 반영 완료
            page4: [
                { base: [240, 288], right: [432, 288], top: [288, 144] }, // 1. 예각
                { base: [192, 288], right: [432, 288], top: [528, 96] },  // 2. 오른쪽으로 기운 둔각삼각형 (밑변 5칸=240px, 높이 4칸=192px, 꼭짓점이 우측 외부 배치)
                { base: [240, 336], right: [384, 336], top: [144, 96] },  // 3. 둔각
                { base: [192, 288], right: [384, 288], top: [336, 96] }   // 4. 예각
            ],
            // 5페이지 3번 삼각형 우측으로 1칸 확장 반영 완료
            page5: [
                { base: [192, 288], right: [480, 288], top: [288, 96] },  // 1. 예각
                { base: [240, 288], right: [384, 288], top: [336, 96] },  // 2. 예각
                { base: [288, 288], right: [528, 288], top: [192, 192] }, // 3. 둔각 (밑변 우측 끝점을 480에서 528로 1칸 확장)
                { base: [240, 288], right: [432, 288], top: [336, 96] }   // 4. 예각
            ]
        };

        let state = {
            currentPage: 1,
            selectedId: null,
            unitBlocks: [],
            splitPieces: [],
            labelsVisible: { base: false, height: false },
            subPageIndex: 0,
            brushColor: '#000000',
            brushSize: 5,
            isEraser: false,
            p5SliceActive: false,
            p4Mode: 'manipulate',
            p5MouseX: 0,
            p5MouseY: 0,
            
            page4States: [
                { splitPieces: [], selectedId: null },
                { splitPieces: [], selectedId: null },
                { splitPieces: [], selectedId: null },
                { splitPieces: [], selectedId: null }
            ],
            page5States: [
                { pieces: null, selectedPiece: null },
                { pieces: null, selectedPiece: null },
                { pieces: null, selectedPiece: null },
                { pieces: null, selectedPiece: null }
            ],

            page5: {
                p5Mode: 'manipulate', 
                sliceMode: false,
                hoveredLine: null,
                selectedPiece: null,
                pieces: []
            }
        };

        const GRID_SIZE_NORMAL = 40;
        const GRID_SIZE_P2_EXPANDED = 48; 
        const GRID_SIZE_EXPANDED = 48;    
        const GRID_SIZE_P5 = 48; 
        
        let canvas, ctx, isDrawing = false;
        let dragTarget = null, dragOffsetX = 0, dragOffsetY = 0;

        function polyArea(pts) {
            let area = 0;
            const n = pts.length;
            for (let i = 0; i < n; i++) {
                const j = (i + 1) % n;
                area += pts[i].x * pts[j].y;
                area -= pts[j].x * pts[i].y;
            }
            return Math.abs(area) / 2;
        }

        function sutherlandHodgman(subjectPoly, clipPoly) {
            let outputList = subjectPoly;
            for (let j = 0; j < clipPoly.length; j++) {
                const edgeStart = clipPoly[j];
                const edgeEnd = clipPoly[(j + 1) % clipPoly.length];
                const inputList = outputList;
                outputList = [];
                if (inputList.length === 0) break;
                let s = inputList[inputList.length - 1];

                for (let i = 0; i < inputList.length; i++) {
                    const p = inputList[i];
                    if (isInsideEdge(p, edgeStart, edgeEnd)) {
                        if (!isInsideEdge(s, edgeStart, edgeEnd)) {
                            outputList.push(intersection(s, p, edgeStart, edgeEnd));
                        }
                        outputList.push(p);
                    } else if (isInsideEdge(s, edgeStart, edgeEnd)) {
                        outputList.push(intersection(s, p, edgeStart, edgeEnd));
                    }
                    s = p;
                }
            }
            return outputList;
        }

        function isInsideEdge(p, start, end) {
            return (end.x - start.x) * (p.y - start.y) - (end.y - start.y) * (p.x - start.x) >= -1e-9;
        }

        function intersection(s, p, start, end) {
            const dc = { x: start.x - end.x, y: start.y - end.y };
            const dp = { x: s.x - p.x, y: s.y - p.y };
            const n1 = start.x * end.y - start.y * end.x;
            const n2 = s.x * p.y - s.y * p.x;
            const n3 = 1.0 / (dc.x * dp.y - dc.y * dp.x);
            return {
                x: Math.round(((n1 * dp.x - dc.x * n2) * n3) * 10000) / 10000,
                y: Math.round(((n1 * dp.y - dc.y * n2) * n3) * 10000) / 10000
            };
        }

        function clipPolygon(vertices, lineType, lineValue, side) {
            let result = [];
            if (vertices.length === 0) return result;
            
            for (let i = 0; i < vertices.length; i++) {
                let current = vertices[i];
                let next = vertices[(i + 1) % vertices.length];
                
                let currInside = checkInsideSide(current, lineType, lineValue, side);
                let nextInside = checkInsideSide(next, lineType, lineValue, side);
                
                if (currInside) {
                    result.push(current);
                }
                
                if (currInside !== nextInside) {
                    let intersectPt = getLineIntersectionPoint(current, next, lineType, lineValue);
                    if (intersectPt) result.push(intersectPt);
                }
            }
            return result;
        }

        function checkInsideSide(pt, type, val, side) {
            if (type === 'h') {
                return side === 'left' ? (pt[1] <= val) : (pt[1] >= val);
            } else {
                return side === 'left' ? (pt[0] <= val) : (pt[0] >= val);
            }
        }

        function getLineIntersectionPoint(p1, p2, type, val) {
            let x1 = p1[0], y1 = p1[1];
            let x2 = p2[0], y2 = p2[1];
            
            if (type === 'h') {
                if (Math.abs(y2 - y1) < 1e-6) return null;
                let t = (val - y1) / (y2 - y1);
                return [x1 + t * (x2 - x1), val];
            } else {
                if (Math.abs(x2 - x1) < 1e-6) return null;
                let t = (val - x1) / (x2 - x1);
                return [val, y1 + t * (y2 - y1)];
            }
        }

        window.onload = function() {
            initApp();
        };

        function initApp() {
            canvas = document.getElementById('drawing-layer');
            ctx = canvas.getContext('2d');
            setupDrawingEvents();
            setupDragAndDropEvents();
            
            canvas.addEventListener('pointermove', (e) => {
                if(state.currentPage === 5) {
                    trackPage5Mouse(e);
                }
            });
            canvas.addEventListener('pointerdown', (e) => {
                if(state.currentPage === 5) {
                    handlePage5CanvasClick(e);
                }
            });

            renderNav();
            switchPage(1);
        }

        function renderNav() {
            const container = document.getElementById('nav-container');
            container.innerHTML = '';
            for(let i = 1; i <= 5; i++) {
                const btn = document.createElement('button');
                btn.className = `w-12 h-12 rounded-xl text-base font-bold transition duration-200 border active:scale-95 flex items-center justify-center cursor-pointer ${state.currentPage === i ? 'bg-amber-500 text-white border-amber-600 shadow-md' : 'bg-stone-50 hover:bg-stone-100 text-stone-600 border-stone-200'}`;
                btn.innerText = i;
                btn.onclick = () => switchPage(i);
                container.appendChild(btn);
            }
        }

        function saveCurrentSubState() {
            if (state.currentPage === 4) {
                state.page4States[state.subPageIndex] = {
                    splitPieces: JSON.parse(JSON.stringify(state.splitPieces)),
                    selectedId: state.selectedId
                };
            } else if (state.currentPage === 5) {
                state.page5States[state.subPageIndex] = {
                    pieces: JSON.parse(JSON.stringify(state.page5.pieces)),
                    selectedPieceId: state.page5.selectedPiece ? state.page5.selectedPiece.id : null
                };
            }
        }

        function loadCurrentSubState() {
            if (state.currentPage === 4) {
                const saved = state.page4States[state.subPageIndex];
                state.splitPieces = saved.splitPieces;
                state.selectedId = saved.selectedId;
            } else if (state.currentPage === 5) {
                const saved = state.page5States[state.subPageIndex];
                if (saved.pieces === null) {
                    initPage5StateForIndex(state.subPageIndex);
                } else {
                    state.page5.pieces = saved.pieces;
                    state.page5.selectedPiece = saved.selectedPieceId ? state.page5.pieces.find(p => p.id === saved.selectedPieceId) : null;
                }
            }
        }

        function switchPage(pageNum) {
            state.currentPage = pageNum;
            state.selectedId = null;
            state.p5SliceActive = false;
            if (pageNum === 4) state.p4Mode = 'manipulate'; 
            resetWorkspaceState(pageNum);
            renderNav();
            
            const workspace = document.getElementById('canvas-workspace');
            workspace.classList.remove('grid-bg-normal', 'grid-bg-p2-expanded');

            if (pageNum === 2 || pageNum === 4 || pageNum === 5) {
                workspace.classList.add('grid-bg-p2-expanded');
            } else {
                workspace.classList.add('grid-bg-normal');
            }

            if (pageNum === 2 || pageNum === 3 || pageNum === 4 || pageNum === 5) {
                document.getElementById('sub-controls').classList.remove('hidden');
            } else {
                document.getElementById('sub-controls').classList.add('hidden');
            }
            document.getElementById('p2-top-explanation').classList.add('hidden');
            
            const drawingPanel = document.getElementById('photo-style-drawing-panel');
            if (pageNum === 1 || pageNum === 2) {
                drawingPanel.classList.add('hidden');
            } else {
                drawingPanel.classList.remove('hidden');
            }
            
            const panel = document.getElementById('panel-content');
            panel.innerHTML = '';

            if (pageNum === 1) {
                renderPage1Controls(panel);
            } else if (pageNum === 2) {
                document.getElementById('p2-explanation-text').innerHTML = `
                    삼각형에서 어느 한 변을 <span class="text-red-600 font-extrabold">'밑변'</span>이라고 하면, 그 밑변과 마주 보는 꼭짓점에서 밑변에 수직으로 그은 선분의 길이를 <span class="text-red-600 font-extrabold">'높이'</span>라고 합니다.
                `;
                document.getElementById('p2-top-explanation').classList.remove('hidden');
                updateSubPageIndicatorText();
                renderPage2Controls(panel);
            } else if (pageNum === 3) {
                updateSubPageIndicatorText();
                panel.innerHTML = `<div class="p-4 bg-stone-50 border border-stone-200 rounded-xl text-xs text-stone-500 text-center">도형 모양 단추를 눌러 다양한 삼각형을 확인하고 선 그리기 도구를 사용해 보세요.</div>`; 
            } else if (pageNum === 4) {
                loadCurrentSubState();
                updateSubPageIndicatorText();
                renderPage4Controls(panel);
                updateDrawingPanelVisibility();
            } else if (pageNum === 5) {
                loadCurrentSubState();
                updateSubPageIndicatorText();
                renderPage5PanelControls(panel);
                updateDrawingPanelVisibility();
            }
            
            updateDrawingToolStyles();
            drawWorkspace();
            lucide.createIcons();
        }

        function resetWorkspaceState(pageNum) {
            state.unitBlocks = [];
            if (pageNum !== 4 && pageNum !== 5) {
                state.splitPieces = [];
            }
            if(pageNum !== 2) {
                state.labelsVisible = { base: false, height: false };
            }
            state.subPageIndex = 0;
            clearCanvasOnly();
        }

        function updateSubPageIndicatorText() {
            const ind = document.getElementById('sub-page-indicator');
            if(!ind) return;
            if(state.currentPage === 2) {
                ind.innerText = `예시 ${state.subPageIndex + 1}`;
            } else if(state.currentPage === 4 || state.currentPage === 5) {
                ind.innerText = `삼각형 예시 ${state.subPageIndex + 1} / 4`;
            } else {
                ind.innerText = `도형 모양 ${state.subPageIndex + 1}`;
            }
        }

        function prevSubShape() {
            const maxIdx = (state.currentPage === 4 || state.currentPage === 5) ? 4 : 3;
            saveCurrentSubState();
            state.subPageIndex = (state.subPageIndex + maxIdx - 1) % maxIdx;
            
            updateSubPageIndicatorText();
            if(state.currentPage === 2) {
                state.labelsVisible = { base: false, height: false };
                syncP2ButtonStyles();
            }
            if(state.currentPage === 3) {
                clearCanvasOnly();
            }
            
            if (state.currentPage === 4) {
                loadCurrentSubState();
                renderPage4Controls(document.getElementById('panel-content'));
            } else if (state.currentPage === 5) {
                loadCurrentSubState();
                renderPage5PanelControls(document.getElementById('panel-content'));
            }
            
            drawWorkspace();
            lucide.createIcons();
        }

        function nextSubShape() {
            const maxIdx = (state.currentPage === 4 || state.currentPage === 5) ? 4 : 3;
            saveCurrentSubState();
            state.subPageIndex = (state.subPageIndex + 1) % maxIdx;
            
            updateSubPageIndicatorText();
            if(state.currentPage === 2) {
                state.labelsVisible = { base: false, height: false };
                syncP2ButtonStyles();
            }
            if(state.currentPage === 3) {
                clearCanvasOnly();
            }
            
            if (state.currentPage === 4) {
                loadCurrentSubState();
                renderPage4Controls(document.getElementById('panel-content'));
            } else if (state.currentPage === 5) {
                loadCurrentSubState();
                renderPage5PanelControls(document.getElementById('panel-content'));
            }
            
            drawWorkspace();
            lucide.createIcons();
        }

        function renderDirectionalPadUI() {
            return `
                <div class="pt-4 border-t border-stone-200 flex flex-col items-center w-full">
                    <span class="text-xs font-bold text-stone-400 block mb-3 text-center">선택 조각 조작 단추</span>
                    <div class="flex justify-center mb-2 w-full">
                        <button id="dpad-up" onclick="moveSelected(0, -1)" class="w-22 h-22 bg-stone-50 hover:bg-stone-100 active:scale-95 border border-stone-300 rounded-2xl flex items-center justify-center transition shadow-sm cursor-pointer">
                            <i data-lucide="arrow-up" class="w-8 h-8 text-stone-700"></i>
                        </button>
                    </div>
                    <div class="flex justify-center gap-2 w-full">
                        <button id="dpad-left" onclick="moveSelected(-1, 0)" class="w-22 h-22 bg-stone-50 hover:bg-stone-100 active:scale-95 border border-stone-300 rounded-2xl flex items-center justify-center transition shadow-sm cursor-pointer">
                            <i data-lucide="arrow-left" class="w-8 h-8 text-stone-700"></i>
                        </button>
                        <button id="dpad-down" onclick="moveSelected(0, 1)" class="w-22 h-22 bg-stone-50 hover:bg-stone-100 active:scale-95 border border-stone-300 rounded-2xl flex items-center justify-center transition shadow-sm cursor-pointer">
                            <i data-lucide="arrow-down" class="w-8 h-8 text-stone-700"></i>
                        </button>

        function renderPage1Controls(p) {

                <button onclick="p1CreatePieces()" class="w-full py-3 bg-teal-600 hover:bg-teal-700 text-white font-bold rounded-xl text-sm shadow cursor-pointer">조각 만들기</button>
                <button onclick="switchPage(1)" class="w-full py-2 bg-stone-200 hover:bg-stone-300 text-stone-700 font-bold rounded-xl text-xs transition cursor-pointer">조각 원위치</button>

        function addUnitBlockP1() {
            const id = 'ub-' + Date.now();
            state.unitBlocks.push({ id: id, x: 40, y: 40, originX: 40, originY: 40, angle: 0 });
            state.selectedId = id;
            drawWorkspace();
        }

        function p1CreatePieces() {
            state.unitBlocks = [];
            state.splitPieces = [];

            const tData = gridShapes.page1;
            const triangle = [
                { x: tData.base[0], y: tData.base[1] },
                { x: tData.right[0], y: tData.right[1] },
                { x: tData.top[0], y: tData.top[1] }
            ];

            const xs = triangle.map(p => p.x);
            const ys = triangle.map(p => p.y);
            const minX = Math.floor(Math.min(...xs) / GRID_SIZE_NORMAL) * GRID_SIZE_NORMAL;
            const maxX = Math.ceil(Math.max(...xs) / GRID_SIZE_NORMAL) * GRID_SIZE_NORMAL;
            const minY = Math.floor(Math.min(...ys) / GRID_SIZE_NORMAL) * GRID_SIZE_NORMAL;
            const maxY = Math.ceil(Math.max(...ys) / GRID_SIZE_NORMAL) * GRID_SIZE_NORMAL;

            const colorPalette = [
                'rgba(167, 139, 250, 0.75)', 'rgba(52, 211, 153, 0.75)', 
                'rgba(252, 211, 77, 0.75)', 'rgba(245, 158, 11, 0.75)', 
                'rgba(147, 197, 253, 0.75)', 'rgba(248, 113, 113, 0.75)'
            ];
            let cIdx = 0;

            for (let gx = minX; gx < maxX; gx += GRID_SIZE_NORMAL) {
                for (let gy = minY; gy < maxY; gy += GRID_SIZE_NORMAL) {
                    const cell = [
                        { x: gx, y: gy },
                        { x: gx + GRID_SIZE_NORMAL, y: gy },
                        { x: gx + GRID_SIZE_NORMAL, y: gy + GRID_SIZE_NORMAL },
                        { x: gx, y: gy + GRID_SIZE_NORMAL }
                    ];

                    const clipped = sutherlandHodgman(triangle, cell);

                    if (clipped.length >= 3 && polyArea(clipped) > 0.1) {
                        const containerX = gx;
                        const containerY = gy;

                        const ptsRelative = clipped.map(pt => [
                            Math.round((pt.x - containerX) * 100) / 100, 
                            Math.round((pt.y - containerY) * 100) / 100
                        ]);
                        
                        state.splitPieces.push({
                            id: `p1-clip-${gx}-${gy}`,
                            x: containerX, y: containerY, originX: containerX, originY: containerY,
                            angle: 0, cx: 20, cy: 20, pts: ptsRelative, fill: colorPalette[cIdx % colorPalette.length]
                        });
                        cIdx++;
                    }
                }
            }

            if (state.splitPieces.length > 0) state.selectedId = state.splitPieces[0].id;
            drawWorkspace();
        }

        function syncPage4ModeUI() {

            const btnDraw = document.getElementById('p4-mode-draw');
            const dpadWrapper = document.getElementById('p4-dpad-wrapper');

        function updateDrawingPanelVisibility() {
            const drawingPanel = document.getElementById('photo-style-drawing-panel');
            if (!drawingPanel) return;
            
            if (state.currentPage === 1 || state.currentPage === 2) {
                drawingPanel.classList.add('hidden');

            if (state.currentPage === 4) {
                if (state.p4Mode === 'manipulate') drawingPanel.classList.add('hidden');

                if (state.page5.p5Mode === 'manipulate') drawingPanel.classList.add('hidden');

        function cloneTriangleP4() {
            if (state.p4Mode === 'draw') return; 
            const src = gridShapes.page4[state.subPageIndex];
            
            const w = src.right[0] - src.base[0];
            const h = src.base[1] - src.top[1];
            const tOffset = src.top[0] - src.base[0];

            state.splitPieces = [{
                id: 'cloned-orange-p4-' + state.subPageIndex, 
                x: src.base[0] + 48, y: src.base[1] - 96, 
                originX: src.base[0] + 48, originY: src.base[1] - 96, 
                angle: 0, cx: 24, cy: 24,
                pts: [[tOffset, 0], [0, h], [w, h]], 
                fill: 'rgba(249, 115, 22, 0.4)'
            }];
            state.selectedId = 'cloned-orange-p4-' + state.subPageIndex;
            saveCurrentSubState();
            drawWorkspace();
        }

        function drawWorkspace() {
            const svg = document.getElementById('svg-layer');
            const htmlLayer = document.getElementById('html-layer');
            svg.innerHTML = '';
            htmlLayer.innerHTML = '';
            const pg = state.currentPage;

            if (pg === 5) {
                renderPage5();
                return;
            }

            if (pg === 1) {
                const t = gridShapes.page1;
                createSVGTriangle(svg, t.base, t.right, t.top, 'fill-blue-400/10 stroke-blue-600 stroke-2');
                renderUnitBlocks(htmlLayer);
                renderSplitPieces(htmlLayer);
            } else if (pg === 2) {
                const data = gridShapes.page2[state.subPageIndex];
                createSVGTriangle(svg, data.base, data.right, data.top, 'fill-amber-400/10 stroke-stone-600 stroke-2');
                const tX = data.top[0], bY = data.base[1], tY = data.top[1];

                if (state.labelsVisible.height) {
                    createSVGLine(svg, data.top, [tX, bY], 'stroke-blue-500 stroke-2 stroke-dasharray-[4_4]');
                    if (data.type === 'obtuse') {
                        createSVGLine(svg, data.base, [tX, bY], 'stroke-stone-400 stroke-2 stroke-dasharray-[4_4]');
                    }
                }
                if(state.labelsVisible.base) {
                    createSVGLine(svg, data.base, data.right, 'stroke-red-500 stroke-[5px] opacity-80');
                    renderTextLabel(htmlLayer, '밑변', (data.base[0]+data.right[0])/2 - 20, bY + 12, 'border-red-500 text-red-600');
                }
                if(state.labelsVisible.height) {
                    createSVGLine(svg, data.top, [tX, bY], 'stroke-blue-500 stroke-[5px] opacity-80');
                    renderTextLabel(htmlLayer, '높이', data.type === 'obtuse' ? tX - 55 : tX + 12, (tY + bY)/2 - 12, 'border-blue-500 text-blue-600');
                }
            } else if (pg === 3) {
                const t = gridShapes.page3[state.subPageIndex];
                createSVGTriangle(svg, t.base, t.right, t.top, 'fill-none stroke-stone-700 stroke-2');
            } else if (pg === 4) {
                const t = gridShapes.page4[state.subPageIndex];
                createSVGTriangle(svg, t.base, t.right, t.top, 'fill-blue-400/10 stroke-blue-600 stroke-2');
                renderSplitPieces(htmlLayer);
            }
        }

        function createSVGTriangle(parent, p1, p2, p3, className) {
            const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            poly.setAttribute('points', `${p1[0]},${p1[1]} ${p2[0]},${p2[1]} ${p3[0]},${p3[1]}`);
            poly.setAttribute('class', className);
            parent.appendChild(poly);
        }

        function createSVGLine(parent, p1, p2, className) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', p1[0]); line.setAttribute('y1', p1[1]);
            line.setAttribute('x2', p2[0]); line.setAttribute('y2', p2[1]);
            line.setAttribute('class', className);
            parent.appendChild(line);
        }

        function renderTextLabel(parent, text, x, y, cls) {
            const div = document.createElement('div');
            div.style.left = `${x}px`; div.style.top = `${y}px`;
            div.className = `absolute px-2 py-0.5 text-xs font-black bg-white border-2 rounded shadow-sm z-40 ${cls}`;
            div.innerText = text;
            parent.appendChild(div);
        }

        function renderUnitBlocks(layer) {
            state.unitBlocks.forEach(b => {
                const isSelected = state.selectedId === b.id;
                const div = document.createElement('div');
                div.id = `dom-${b.id}`; div.className = 'pure-unit-block';
                if(isSelected) div.classList.add('border-2', 'border-red-500', 'z-50');
                div.style.left = `${b.x}px`; div.style.top = `${b.y}px`;
                div.style.transform = `rotate(${b.angle}deg)`;
                div.style.transformOrigin = `20px 20px`; 
                div.innerText = '1cm²'; div.style.pointerEvents = 'auto';
                div.onpointerdown = (e) => startDrag(e, b, true);
                layer.appendChild(div);
            });
        }

        function renderSplitPieces(layer) {
            state.splitPieces.forEach(p => {
                const blockInteraction = (state.currentPage === 4 && state.p4Mode === 'draw');
                const isSelected = state.selectedId === p.id;
                
                const container = document.createElement('div');
                container.id = `dom-${p.id}`; container.className = 'piece-container';
                if(isSelected) container.style.zIndex = '50';
                
                container.style.left = `${p.x}px`; container.style.top = `${p.y}px`;
                container.style.transform = `rotate(${p.angle}deg)`;
                container.style.transformOrigin = `${p.cx}px ${p.cy}px`;

                const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.setAttribute('width', '640'); svg.setAttribute('height', '400');
                svg.style.overflow = 'visible';

                const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                let ptsStr = p.pts.map(pt => `${pt[0]},${pt[1]}`).join(' ');
                
                poly.setAttribute('points', ptsStr); poly.setAttribute('fill', p.fill);
                
                if (state.currentPage === 1) {
                    poly.setAttribute('stroke', isSelected ? '#EF4444' : 'rgba(0,0,0,0.25)');
                    poly.setAttribute('stroke-width', isSelected ? '2' : '0.75');
                } else {
                    poly.setAttribute('stroke', isSelected ? '#EF4444' : '#4B5563');
                    poly.setAttribute('stroke-width', isSelected ? '2.5' : '1.5');
                }

                if (blockInteraction || state.p5SliceActive) {
                    poly.style.pointerEvents = 'none';
                } else {
                    poly.style.pointerEvents = 'visiblePainted'; poly.style.cursor = 'move';
                    poly.onpointerdown = (e) => { e.stopPropagation(); startDrag(e, p, false); };
                }

                svg.appendChild(poly);
                container.appendChild(svg);
                layer.appendChild(container);
            });
        }

        function getActiveSnapUnit() {
            if (state.currentPage === 2) return (GRID_SIZE_P2_EXPANDED / 2);
            if (state.currentPage === 4) return (GRID_SIZE_EXPANDED / 2);
            if (state.currentPage === 5) return (GRID_SIZE_P5 / 2);
            return (GRID_SIZE_NORMAL / 2);
        }

        function snapToHalfGrid(val) {
            const unit = getActiveSnapUnit();
            return Math.round(val / unit) * unit;
        }

        function startDrag(target, isUnitBlock) {
            if (state.currentPage === 4 && state.p4Mode === 'draw') return;
            if (state.currentPage === 5) return; 

            e.preventDefault(); e.stopPropagation();
            state.selectedId = target.id;
            dragTarget = target;
            
            dragOffsetX = e.clientX - target.x;
            dragOffsetY = e.clientY - target.y;

            document.onpointermove = doDrag;
            document.onpointerup = stopDrag;
            drawWorkspace();
        }

        function doDrag(e) {
            if (!dragTarget) return;

            let rawX = e.clientX - dragOffsetX;
            let rawY = e.clientY - dragOffsetY;

            rawX = Math.max(-400, Math.min(1000, rawX));
            rawY = Math.max(-400, Math.min(1000, rawY));

            dragTarget.x = snapToHalfGrid(rawX);
            dragTarget.y = snapToHalfGrid(rawY);

            const dom = document.getElementById(`dom-${dragTarget.id}`);
            if (dom) {
                dom.style.left = `${dragTarget.x}px`;
                dom.style.top = `${dragTarget.y}px`;
            }
        }

        function stopDrag() {
            if (dragTarget) {
                saveCurrentSubState();
            }
            document.onpointermove = null; document.onpointerup = null;
            dragTarget = null;
        }

        function moveSelected(dx, dy) {
            if (state.currentPage === 4 && state.p4Mode === 'draw') return; 
            if (state.currentPage === 5 && state.page5.p5Mode === 'draw') return; 
            
            if (state.currentPage === 5) {
                if (state.page5.selectedPiece) {
                    const step = GRID_SIZE_P5 / 2; 
                    state.page5.selectedPiece.offsetX = snapToHalfGrid(state.page5.selectedPiece.offsetX + dx * step);
                    state.page5.selectedPiece.offsetY = snapToHalfGrid(state.page5.selectedPiece.offsetY + dy * step);
                    saveCurrentSubState();
                    drawWorkspace();
                }
                return;
            }

            let target = state.unitBlocks.find(b => b.id === state.selectedId) || 
                         state.splitPieces.find(p => p.id === state.selectedId);
            if (!target) return;

            const unit = getActiveSnapUnit();
            target.x = snapToHalfGrid(target.x + (dx * unit));
            target.y = snapToHalfGrid(target.y + (dy * unit));

            saveCurrentSubState();
            drawWorkspace();
        }

        function rotateSelectedPiece() {
            if (state.currentPage === 4 && state.p4Mode === 'draw') return; 
            if (state.currentPage === 5 && state.page5.p5Mode === 'draw') return; 
            
            if (state.currentPage === 5) {
                if (state.page5.selectedPiece) {
                    state.page5.selectedPiece.angle = (state.page5.selectedPiece.angle + 90) % 360;
                    state.page5.selectedPiece.offsetX = snapToHalfGrid(state.page5.selectedPiece.offsetX);
                    state.page5.selectedPiece.offsetY = snapToHalfGrid(state.page5.selectedPiece.offsetY);
                    saveCurrentSubState();
                    drawWorkspace();
                }
                return;
            }

            let target = state.unitBlocks.find(b => b.id === state.selectedId) || 
                         state.splitPieces.find(p => p.id === state.selectedId);
            if (!target) return;

            target.angle = (target.angle + 90) % 360;
            target.x = snapToHalfGrid(target.x);
            target.y = snapToHalfGrid(target.y);

            saveCurrentSubState();
            drawWorkspace();
        }

        function setupDrawingEvents() {
            canvas.onpointerdown = (e) => {
                if (state.currentPage === 1 || state.currentPage === 2) return;
                if (state.currentPage === 4 && state.p4Mode === 'manipulate') return;
                if (state.currentPage === 5 && state.page5.p5Mode === 'manipulate') return; 

                canvas.setPointerCapture(e.pointerId);

                isDrawing = true;
                ctx.beginPath();
                const rect = canvas.getBoundingClientRect();
                ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
            };

            canvas.onpointermove = (e) => {
                if (state.currentPage === 1 || state.currentPage === 2) return;
                if (!isDrawing) return;
                if (state.currentPage === 4 && state.p4Mode === 'manipulate') { isDrawing = false; return; }
                if (state.currentPage === 5 && state.page5.p5Mode === 'manipulate') { isDrawing = false; return; }

                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                if (state.isEraser) {
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.lineWidth = state.brushSize * 2.5; 
                    ctx.lineTo(x, y); ctx.stroke();
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.strokeStyle = state.brushColor;
                    ctx.lineWidth = state.brushSize;
                    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                    ctx.lineTo(x, y); ctx.stroke();
                }
            };

            canvas.onpointerup = (e) => { 
                isDrawing = false; 
                if(ctx) ctx.closePath(); 
                try { canvas.releasePointerCapture(e.pointerId); } catch(err) {}
            };
            canvas.onpointerleave = (e) => { 
                isDrawing = false; 
                if(ctx) ctx.closePath(); 
            };
        }

        function setupDragAndDropEvents() {
            document.getElementById('html-layer').onpointerup = stopDrag;
        }

        function changeBrushColor(color) {
            state.isEraser = false; state.brushColor = color;
            updateDrawingToolStyles();
        }

        function setEraserMode() {
            state.isEraser = true;
            updateDrawingToolStyles();
        }

        function changeBrushSize(size) {
            state.brushSize = size;
            updateDrawingToolStyles();
        }

        function clearCanvasOnly() {
            if(ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function updateDrawingToolStyles() {
            const chips = {
                '#000000': document.getElementById('chip-black'),
                '#EF4444': document.getElementById('chip-red'),
                '#3B82F6': document.getElementById('chip-blue'),
                '#22C55E': document.getElementById('chip-green')
            };
            const eraser = document.getElementById('chip-eraser');

            for (let c in chips) {
                if (chips[c]) {
                    const baseClass = "w-8 h-8 rounded-full transition transform cursor-pointer";
                    const colorClass = c === '#000000' ? 'bg-black' : c === '#EF4444' ? 'bg-red-500' : c === '#3B82F6' ? 'bg-blue-500' : 'bg-green-500';
                    
                    if (!state.isEraser && state.brushColor === c) {
                        chips[c].className = `${baseClass} ring-4 ring-amber-400 scale-110 ${colorClass}`;
                    } else {
                        chips[c].className = `${baseClass} hover:scale-105 border-2 border-transparent ${colorClass}`;
                    }
                }
            }

            if (eraser) {
                eraser.className = state.isEraser 
                    ? "w-8 h-8 rounded-lg bg-stone-700 text-white transition transform ring-4 ring-amber-400 scale-110 cursor-pointer flex items-center justify-center"
                    : "w-8 h-8 rounded-lg bg-stone-200 hover:bg-stone-300 text-stone-700 transition transform border border-stone-400 cursor-pointer flex items-center justify-center";
            }

            [2, 5, 9].forEach(sz => {
                const bar = document.getElementById(`bar-size-${sz}`);
                if (bar) bar.className = (state.brushSize === sz) ? "flex-1 py-3 flex items-center justify-center rounded-md bg-stone-200 border border-stone-400 transition cursor-pointer" : "flex-1 py-3 flex items-center justify-center rounded-md hover:bg-stone-50 transition cursor-pointer";
            });
        }

        /* ========================================================================
           ■ 5페이지 기하 연산 보정 및 위치 갱신 모듈
           ======================================================================== */

        function initPage5StateForIndex(idx) {
            const src = gridShapes.page5[idx];
            state.page5.pieces = [
                {
                    id: 'triangle-init-p5-' + idx,
                    vertices: [
                        {x: src.base[0], y: src.base[1]},
                        {x: src.right[0], y: src.right[1]},
                        {x: src.top[0], y: src.top[1]} 
                    ],
                    offsetX: 0,
                    offsetY: 0,
                    angle: 0,
                    fill: 'rgba(16, 185, 129, 0.5)'
                }
            ];
            state.page5.selectedPiece = null;
        }

        function renderPage5() {
            const svg = document.getElementById('svg-layer');
            svg.innerHTML = ''; 

            const src = gridShapes.page5[state.subPageIndex];
            const basePolyGuide = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            basePolyGuide.setAttribute('points', `${src.base[0]},${src.base[1]} ${src.right[0]},${src.right[1]} ${src.top[0]},${src.top[1]}`);
            basePolyGuide.setAttribute('fill', 'rgba(16, 185, 129, 0.08)');
            basePolyGuide.setAttribute('stroke', '#10B981');
            basePolyGuide.setAttribute('stroke-width', '2');
            basePolyGuide.setAttribute('stroke-dasharray', '4 4');
            basePolyGuide.setAttribute('style', 'pointer-events: none;');
            svg.appendChild(basePolyGuide);

            state.page5.pieces.forEach(piece => {
                const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                
                const worldPts = getPieceWorldVertices(piece);
                const ptsStr = worldPts.map(pt => `${pt.x},${pt.y}`).join(' ');
                poly.setAttribute('points', ptsStr);
                poly.setAttribute('fill', piece.fill || 'rgba(16, 185, 129, 0.5)');
                
                const isSelected = (state.page5.selectedPiece && state.page5.selectedPiece.id === piece.id);
                poly.setAttribute('stroke', isSelected ? '#EF4444' : '#4B5563');
                poly.setAttribute('stroke-width', isSelected ? '3' : '1.5');
                svg.appendChild(poly);
            });

            if (state.page5.sliceMode) {
                renderSliceOverlay(svg);
            }
        }

        function togglePage5Slice() {
            if (state.page5.p5Mode === 'draw') return; 
            state.page5.sliceMode = !state.page5.sliceMode;
            if (state.page5.sliceMode) {
                state.page5.hoveredLine = null; 
            }
            syncPage5PanelUI();
            renderPage5();
        }

        function renderSliceOverlay(svg) {
            const hoverLine = state.page5.hoveredLine;
            
            for (let x = 48; x < 640; x += 48) {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x); line.setAttribute('y1', 0);
                line.setAttribute('x2', x); line.setAttribute('y2', 400);
                
                const isHovered = (hoverLine && hoverLine.type === 'v' && hoverLine.value === x);
                line.setAttribute('stroke', isHovered ? 'rgba(34,197,94,0.7)' : 'rgba(34,197,94,0.15)');
                line.setAttribute('stroke-width', isHovered ? '5' : '2');
                if (!isHovered) line.setAttribute('stroke-dasharray', '4 4');
                line.style.cursor = 'pointer';
                line.style.pointerEvents = 'stroke';
                svg.appendChild(line);
            }

            for (let y = 48; y < 400; y += 48) {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', 0); line.setAttribute('y1', y);
                line.setAttribute('x2', 640); line.setAttribute('y2', y);
                
                const isHovered = (hoverLine && hoverLine.type === 'h' && hoverLine.value === y);
                line.setAttribute('stroke', isHovered ? 'rgba(34,197,94,0.7)' : 'rgba(34,197,94,0.15)');
                line.setAttribute('stroke-width', isHovered ? '5' : '2');
                if (!isHovered) line.setAttribute('stroke-dasharray', '4 4');
                line.style.cursor = 'pointer';
                line.style.pointerEvents = 'stroke';
                svg.appendChild(line);
            }
        }

        function cutPage5(line) {
            let nextPieces = [];
            let flagAnyCut = false;

            const colorPalette = [
                'rgba(167, 139, 250, 0.7)', 'rgba(52, 211, 153, 0.7)', 
                'rgba(252, 211, 77, 0.7)', 'rgba(245, 158, 11, 0.7)', 
                'rgba(147, 197, 253, 0.7)', 'rgba(248, 113, 113, 0.7)',
                'rgba(236, 72, 153, 0.7)', 'rgba(14, 165, 233, 0.7)'
            ];

            state.page5.pieces.forEach(piece => {
                const worldVerts = getPieceWorldVertices(piece);
                const slicedPair = slicePolygon(worldVerts, line);

                if (slicedPair) {
                    flagAnyCut = true;
                    slicedPair.forEach((verts, idx) => {
                        const center = getVerticesCenter(verts);
                        const snappedCenterX = snapToHalfGrid(center.x);
                        const snappedCenterY = snapToHalfGrid(center.y);

                        const localVerts = verts.map(pt => ({
                            x: pt.x - snappedCenterX,
                            y: pt.y - snappedCenterY
                        }));

                        nextPieces.push({
                            id: 'p5-split-' + Date.now() + '-' + Math.random().toString(36).substr(2,4),
                            vertices: localVerts,
                            offsetX: snappedCenterX,
                            offsetY: snappedCenterY,
                            angle: 0,
                            fill: colorPalette[nextPieces.length % colorPalette.length]
                        });
                    });
                } else {
                    nextPieces.push(piece);
                }
            });

            if (flagAnyCut) {
                state.page5.pieces = nextPieces;
                state.page5.selectedPiece = null; 
            }

            state.page5.sliceMode = false;
            state.page5.hoveredLine = null;
            saveCurrentSubState();
            syncPage5PanelUI();
            renderPage5();
        }

        function slicePolygon(vertices, line) {
            let polyA = [];
            let polyB = [];

            if (line.type === 'v') {
                polyA = clipPolygonAxis(vertices, 'x', line.value, 'less');
                polyB = clipPolygonAxis(vertices, 'x', line.value, 'greater');
            } else {
                polyA = clipPolygonAxis(vertices, 'y', line.value, 'less');
                polyB = clipPolygonAxis(vertices, 'y', line.value, 'greater');
            }

            const areaA = getPolygonArea(polyA);
            const areaB = getPolygonArea(polyB);

            if (polyA.length >= 3 && polyB.length >= 3 && areaA > 10 && areaB > 10) {
                return [polyA, polyB];
            }
            return null; 
        }

        function clipPolygonAxis(vertices, axis, limit, mode) {
            let result = [];
            if (vertices.length === 0) return result;

            for (let i = 0; i < vertices.length; i++) {
                const curr = vertices[i];
                const next = vertices[(i + 1) % vertices.length];

                const currVal = curr[axis];
                const nextVal = next[axis];

                const currIn = (mode === 'less') ? (currVal <= limit) : (currVal >= limit);
                const nextIn = (mode === 'less') ? (nextVal <= limit) : (nextVal >= limit);

                if (currIn) {
                    result.push(curr);
                }

                if (currIn !== nextIn) {
                    const ratio = (limit - currVal) / (nextVal - currVal);
                    const intersectPt = {
                        x: curr.x + ratio * (next.x - curr.x),
                        y: curr.y + ratio * (next.y - curr.y)
                    };
                    result.push(intersectPt);
                }
            }
            return result;
        }

        function pointInPolygon(pt, verts) {
            let inside = false;
            for (let i = 0, j = verts.length - 1; i < verts.length; j = i++) {
                const xi = verts[i].x, yi = verts[i].y;
                const xj = verts[j].x, yj = verts[j].y;

                const intersect = ((yi > pt.y) !== (yj > pt.y))
                    && (pt.x < (xj - xi) * (pt.y - yi) / (yj - yi + 1e-9) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        function getPieceWorldVertices(piece) {
            const rad = (piece.angle * Math.PI) / 180;
            const cos = Math.cos(rad);
            const sin = Math.sin(rad);

            return piece.vertices.map(v => {
                const rx = v.x * cos - v.y * sin;
                const ry = v.x * sin + v.y * cos;
                return {
                    x: rx + piece.offsetX,
                    y: ry + piece.offsetY
                };
            });
        }

        function getVerticesCenter(verts) {
            let sx = 0, sy = 0;
            verts.forEach(v => { sx += v.x; sy += v.y; });
            return { x: sx / verts.length, y: sy / verts.length };
        }

        function getPolygonArea(verts) {
            if (verts.length < 3) return 0;
            let area = 0;
            for (let i = 0; i < verts.length; i++) {
                const j = (i + 1) % verts.length;
                area += verts[i].x * verts[j].y;
                area -= verts[j].x * verts[i].y;
            }
            return Math.abs(area) / 2;
        }

        function trackPage5Mouse(e) {
            if (state.page5.p5Mode === 'draw') return; 
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            if (state.page5.sliceMode) {
                const nearX = Math.round(mx / 48) * 48;
                const nearY = Math.round(my / 48) * 48;

                const dx = Math.abs(mx - nearX);
                const dy = Math.abs(my - nearY);

                state.page5.hoveredLine = (dx < dy) ? { type: 'v', value: nearX } : { type: 'h', value: nearY };
                renderPage5();
            }
        }

        function handlePage5CanvasClick(e) {
            if (state.page5.p5Mode === 'draw') return; 
            
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            if (state.page5.sliceMode && state.page5.hoveredLine) {
                cutPage5(state.page5.hoveredLine);
                return;
            }

            let foundTarget = null;
            for (let i = state.page5.pieces.length - 1; i >= 0; i--) {
                const piece = state.page5.pieces[i];
                const worldVerts = getPieceWorldVertices(piece);
                if (pointInPolygon({x: mx, y: my}, worldVerts)) {
                    foundTarget = piece;
                    break;
                }
            }

            if (foundTarget) {
                state.page5.selectedPiece = foundTarget;
                
                const initialPieceX = foundTarget.offsetX;
                const initialPieceY = foundTarget.offsetY;
                const startDragMouseX = e.clientX;
                const startDragMouseY = e.clientY;

                canvas.setPointerCapture(e.pointerId);

                const moveHandler = (moveEvent) => {
                    if (moveEvent.pointerId !== e.pointerId) return;

                    const deltaX = moveEvent.clientX - startDragMouseX;
                    const deltaY = moveEvent.clientY - startDragMouseY;
                    
                    const snapUnit = GRID_SIZE_P5 / 2;
                    foundTarget.offsetX = Math.round((initialPieceX + deltaX) / snapUnit) * snapUnit;
                    foundTarget.offsetY = Math.round((initialPieceY + deltaY) / snapUnit) * snapUnit;
                    renderPage5();
                };

                const upHandler = (upEvent) => {
                    if (upEvent.pointerId !== e.pointerId) return;

                    foundTarget.offsetX = snapToHalfGrid(foundTarget.offsetX);
                    foundTarget.offsetY = snapToHalfGrid(foundTarget.offsetY);
                    saveCurrentSubState();
                    renderPage5();

                    window.removeEventListener('pointermove', moveHandler);
                    window.removeEventListener('pointerup', upHandler);
                    try { canvas.releasePointerCapture(e.pointerId); } catch(err) {}
                };

                window.addEventListener('pointermove', moveHandler);
                window.addEventListener('pointerup', upHandler);
            } else {
                state.page5.selectedPiece = null; 
            }
            renderPage5();
        }

        function renderPage5PanelControls(p) {
            p.innerHTML = `
                <div class="flex rounded-xl bg-stone-100 p-1 border border-stone-200 mb-3">
                    <button id="p5-mode-manipulate" onclick="setPage5Mode('manipulate')" class="flex-1 py-2 text-xs font-bold rounded-lg text-center transition cursor-pointer">
                        조각 조작 모드
                    </button>
                    <button id="p5-mode-draw" onclick="setPage5Mode('draw')" class="flex-1 py-2 text-xs font-bold rounded-lg text-center transition cursor-pointer">
                        그리기 모드
                    </button>
                </div>
                <div class="space-y-2 w-full">
                    <button id="btn-p5-slice-v2" onclick="togglePage5Slice()" class="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl text-sm shadow transition cursor-pointer">삼각형 자르기</button>
                    <button onclick="resetPage5CurrentIndex()" class="w-full py-2 bg-stone-100 text-stone-600 font-bold rounded-xl text-xs border border-stone-300 transition cursor-pointer">현재 도형 초기화</button>
                </div>
                <div id="p5-dpad-wrapper" class="w-full">
                    ${renderDirectionalPadUI()}
                </div>
            `;
            syncPage5ModeUI();
        }

        function resetPage5CurrentIndex() {
            initPage5StateForIndex(state.subPageIndex);
            saveCurrentSubState();
            clearCanvasOnly();
            drawWorkspace();
        }

        function setPage5Mode(mode) {
            state.page5.p5Mode = mode;
            state.page5.sliceMode = false; 
            state.page5.hoveredLine = null;
            
            syncPage5ModeUI();
            updateDrawingPanelVisibility();
            drawWorkspace();
            lucide.createIcons();
        }

        function syncPage5ModeUI() {
            const btnManipulate = document.getElementById('p5-mode-manipulate');
            const btnDraw = document.getElementById('p5-mode-draw');
            const dpadWrapper = document.getElementById('p5-dpad-wrapper');
            const sliceBtn = document.getElementById('btn-p5-slice-v2');

            if (!btnManipulate || !btnDraw) return;

            if (state.page5.p5Mode === 'manipulate') {
                btnManipulate.className = "flex-1 py-2 text-xs font-bold rounded-lg text-center bg-white text-stone-800 shadow-sm cursor-pointer";
                btnDraw.className = "flex-1 py-2 text-xs font-bold rounded-lg text-center text-stone-500 hover:text-stone-800 cursor-pointer";
                if (dpadWrapper) dpadWrapper.classList.remove('hidden');
                if (sliceBtn) {
                    sliceBtn.disabled = false;
                    sliceBtn.className = "w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl text-sm shadow cursor-pointer";
                    sliceBtn.innerText = "삼각형 자르기";
                }
            } else {
                btnManipulate.className = "flex-1 py-2 text-xs font-bold rounded-lg text-center text-stone-500 hover:text-stone-800 cursor-pointer";
                btnDraw.className = "flex-1 py-2 text-xs font-bold rounded-lg text-center bg-white text-stone-800 shadow-sm cursor-pointer";
                if (dpadWrapper) dpadWrapper.classList.add('hidden');
                if (sliceBtn) {
                    sliceBtn.disabled = true;
                    sliceBtn.className = "w-full py-3 bg-stone-200 text-stone-400 font-bold rounded-xl text-sm cursor-not-allowed";
                    sliceBtn.innerText = "조작 모드에서 가능합니다";
                }
            }
        }

        function syncPage5PanelUI() {
            const btn = document.getElementById('btn-p5-slice-v2');
            if (!btn || state.page5.p5Mode === 'draw') return;
            
            if (state.page5.sliceMode) {
                btn.className = "w-full py-3 bg-red-500 text-white font-bold rounded-xl text-sm shadow cursor-pointer animate-pulse";
                btn.innerText = "자르고 싶은 모눈선을 누르세요";
            } else {
                btn.className = "w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl text-sm shadow cursor-pointer";
                btn.innerText = "삼각형 자르기";
            }
        }
    </script>
